<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Register - Online Voting System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-wrapper">
        <!-- Inline same logo SVG for brand consistency -->
        <svg class="logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
              <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="100" fill="url(#logoGradient)"/>
          <circle cx="100" cy="100" r="92" fill="white" opacity="0.95"/>
          <g transform="translate(100, 100)">
            <rect x="-35" y="-40" width="70" height="75" rx="6" fill="url(#logoGradient)"/>
            <rect x="-35" y="-45" width="70" height="8" rx="4" fill="url(#logoGradient)"/>
            <path d="M -15 -20 L -5 -5 L 20 -35" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </svg>
      </div>
      <h1>Online Voting System</h1>
      <p class="subtitle">Secure • Democratic • Transparent</p>
    </div>

    <div id="auth">
      <h3><i class="fas fa-user-plus"></i> Create Account</h3>
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input id="reg-name" type="text" placeholder="Enter your full name" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input id="reg-email" type="email" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Create a password" />
      </div>
      <button id="reg-btn"><i class="fas fa-user-plus"></i> Register</button>

      <p class="small-note">Already have an account? <a href="index.html">Sign in</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
